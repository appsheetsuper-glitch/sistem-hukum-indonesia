<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manajemen Materi Perkuliahan</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-50 p-4 sm:p-8">

  <div class="max-w-6xl mx-auto space-y-6">

    <!-- HEADER -->
    <div class="bg-white border rounded-xl p-4 sm:p-5 shadow-sm">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">

        <div class="text-center sm:text-left">
          <h1 class="text-lg sm:text-2xl font-bold">
            SISTEM HUKUM INDONESIA [HKI]
          </h1>
          <p id="tanggal" class="text-gray-500 text-sm"></p>
        </div>

        <div class="text-center sm:text-right">
          <p class="text-xs text-gray-500">Waktu Sekarang</p>
          <p id="jam" class="text-lg sm:text-xl font-semibold font-mono"></p>
        </div>

      </div>
    </div>

    <!-- SEARCH & FILTER -->
    <div class="bg-white border rounded-xl p-4 shadow-sm flex flex-col sm:flex-row gap-3">

      <input 
        type="text" 
        id="search"
        placeholder="Cari topik..."
        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-black"
      >

      <select 
        id="filterPertemuan"
        class="w-full sm:w-56 border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-black"
      >
        <option value="">Semua Pertemuan</option>
      </select>

    </div>

    <!-- TABLE -->
    <div class="bg-white border rounded-xl shadow-sm overflow-x-auto">
      <table class="w-full text-sm">

        <thead class="bg-gray-100">
          <tr>
            <th class="text-left px-4 py-3">No.</th>
            <th class="text-left px-4 py-3">Topik / Subtopik</th>
            <th class="text-left px-4 py-3">CPMK</th>
            <th class="text-left px-4 py-3">Metode</th>
            <th class="text-left px-4 py-3">Tugas / Penilaian</th>
            <th class="text-center px-4 py-3">Materi</th>
            <th class="text-center px-4 py-3">Slide</th>
          </tr>
        </thead>

        <tbody id="tableBody"></tbody>

      </table>
    </div>

  </div>

<script>
lucide.createIcons();

// ================= API =================
const API_URL = "https://script.google.com/macros/s/AKfycbxt20YImEl4XbIR2h9TJG3POWbNk0xoD6Zvc84twt32Vpz4826HIJNI3wC9E_w0TqW3/exec";

// ================= LOAD DATA =================
async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    const table = document.getElementById("tableBody");
    const filter = document.getElementById("filterPertemuan");

    table.innerHTML = "";
    filter.innerHTML = '<option value="">Semua Pertemuan</option>';

    let pertemuanSet = new Set();

    data.forEach(row => {
      pertemuanSet.add(row[0]);

      table.innerHTML += `
        <tr class="border-t hover:bg-gray-50">
          <td class="px-4 py-2">${row[0]}</td>
          <td class="px-4 py-2">${row[1]}</td>
          <td class="px-4 py-2">${row[2]}</td>
          <td class="px-4 py-2">${row[3]}</td>
          <td class="px-4 py-2">${row[4]}</td>

          <td class="text-center">
            <a href="${row[5]}" target="_blank">
              <i data-lucide="link" class="w-4 h-4 mx-auto"></i>
            </a>
          </td>

          <td class="text-center">
            <a href="${row[6]}" target="_blank">
              <i data-lucide="file-text" class="w-4 h-4 mx-auto"></i>
            </a>
          </td>
        </tr>
      `;
    });

    pertemuanSet.forEach(p => {
      filter.innerHTML += `<option value="${p}">Pertemuan ${p}</option>`;
    });

    lucide.createIcons();

  } catch (err) {
    console.error("Error:", err);
  }
}

// ================= SEARCH & FILTER =================
const searchInput = document.getElementById("search");
const filter = document.getElementById("filterPertemuan");

function filterTable() {
  const search = searchInput.value.toLowerCase();
  const pertemuan = filter.value;

  document.querySelectorAll("#tableBody tr").forEach(row => {
    const text = row.innerText.toLowerCase();
    const matchSearch = text.includes(search);
    const matchFilter = pertemuan === "" || row.children[0].innerText === pertemuan;

    row.style.display = (matchSearch && matchFilter) ? "" : "none";
  });
}

searchInput.addEventListener("keyup", filterTable);
filter.addEventListener("change", filterTable);

// ================= JAM =================
setInterval(() => {
  document.getElementById("jam").innerText =
    new Date().toLocaleTimeString("id-ID", { hour12: false });
}, 1000);

// ================= TANGGAL =================
document.getElementById("tanggal").innerText =
  new Date().toLocaleDateString("id-ID", {
    weekday: 'long',
    year: 'numeric',
    month: 'long',
    day: 'numeric'
  });

// INIT
loadData();
</script>

</body>
</html>
